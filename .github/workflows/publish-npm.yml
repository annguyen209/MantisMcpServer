name: Publish npm package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm run pack:check

      - name: Publish mode (NPM_TOKEN)
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: echo "Using NPM_TOKEN publish path"

      - name: Publish mode (trusted fallback)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: echo "Using trusted publishing fallback path"

      - name: Publish to npm (NPM_TOKEN)
        if: ${{ secrets.NPM_TOKEN != '' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (trusted publishing fallback)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm publish --access public --provenance
